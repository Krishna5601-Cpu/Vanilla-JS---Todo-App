<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo App</title>
  <link rel="stylesheet" href="todo.css">
</head>

<body>
  <div class="app-wrapper">
    <div class="app-card">
      <header class="app-header">
        <div>
          <h1 class="app-title">🔥 ToDo Fire List</h1>
          <p class="app-subtitle">Stay sharp, finish strong.</p>
        </div>
        <span class="task-counter" id="task-counter">0 tasks</span>
      </header>

      <!-- Add Todo Form -->
      <form id="todo-form" class="todo-form">
        <div class="field-group">
          <label for="todo-text" class="field-label">Task</label>
          <input id="todo-text" type="text" placeholder="What do you need to get done?" autocomplete="off" required />
        </div>

        <div class="field-group">
          <label for="todo-date" class="field-label">Due date</label>
          <div class="date-wrapper">
            <input type="date" id="todo-date" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          Add Task
        </button>
      </form>

      <!-- Controls: Filters + Sorting -->
      <div class="controls">
        <div class="filters">
          <button type="button" class="chip chip-active" data-filter="all">All</button>
          <button type="button" class="chip" data-filter="active">Active</button>
          <button type="button" class="chip" data-filter="completed">Completed</button>
        </div>

        <div class="sort">
          <label for="sort-select" class="field-label">Sort by</label>
          <select id="sort-select" class="sort-select">
            <option value="created_desc">Newest created</option>
            <option value="created_asc">Oldest created</option>
            <option value="date_asc">Due date ↑ (earliest)</option>
            <option value="date_desc">Due date ↓ (latest)</option>
          </select>
        </div>
      </div>

      <!-- ToDo List -->
      <ul id="todo-list" class="todo-list">
        <!-- JS will render items here -->
      </ul>
    </div>
  </div>

  <script src="todo.js"></script>
</body>

</html>
